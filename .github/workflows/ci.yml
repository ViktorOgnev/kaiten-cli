name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Run test suite
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build backend
        run: python -m pip install --upgrade pip build
      - name: Build sdist and wheel
        run: python -m build

  install-smoke:
    runs-on: ubuntu-latest
    env:
      PIPX_HOME: ${{ github.workspace }}/.pipx
      PIPX_BIN_DIR: ${{ github.workspace }}/.bin
      UV_TOOL_DIR: ${{ github.workspace }}/.uv-tools
      UV_TOOL_BIN_DIR: ${{ github.workspace }}/.bin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packaging tools
        run: python -m pip install --upgrade pip build uv pipx
      - name: Expose tool bin dir
        run: echo "${GITHUB_WORKSPACE}/.bin" >> "$GITHUB_PATH"
      - name: Smoke test build
        run: python -m build
      - name: Compute pipx git spec
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "PIPX_GIT_SPEC=git+${{ github.event.pull_request.head.repo.clone_url }}@${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          else
            echo "PIPX_GIT_SPEC=git+${{ github.server_url }}/${{ github.repository }}.git@${{ github.sha }}" >> "$GITHUB_ENV"
          fi
      - name: Install from git via pipx
        run: python -m pipx install "$PIPX_GIT_SPEC"
      - name: Verify pipx-installed CLI
        run: |
          kaiten --version
          kaiten --help
          kaiten search-tools cards
      - name: Remove pipx install
        run: python -m pipx uninstall kaiten-cli
      - name: Install from git via uv
        run: uv tool install "git+file://${GITHUB_WORKSPACE}"
      - name: Verify uv-installed CLI
        run: |
          kaiten --version
          kaiten --help
          kaiten search-tools cards
